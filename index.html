<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avant-Garde Experience</title>
<style>
  /* ── 基礎全域設定 ── */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  html {
    scroll-behavior: smooth;
  }
  body { 
    background: #f3f3f4; 
    width: 100vw; 
    overflow-x: hidden; 
    font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif; 
  }

  /* ── 💻 桌機版專用樣式（只在螢幕大於 768px 時生效） ── */
  @media (min-width: 769px) {
    /* 讓手機版的專屬圖片容器在桌機上完全消失 */
    .mobile-only-view { display: none !important; }

    .page-section {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    #page-home { background-color: #f3f3f4; z-index: 10; }
    #video-container {
      position: absolute; top: 60px; left: 0; width: 100vw; height: calc(100vh - 60px); 
      z-index: 5; pointer-events: none; display: flex; align-items: center; justify-content: center;
    }
    .scene-vid { max-width: 100%; max-height: 100%; display: block; object-fit: contain; }
    
    .navbar {
      position: fixed; top: 0; left: 0; width: 100vw; height: 60px; 
      padding: 0 5vw; z-index: 100; display: flex; align-items: center; justify-content: flex-end; background: transparent; 
    }
    .nav-links { position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 40px; list-style: none; }
    .nav-links a { color: rgba(2, 6, 23, 0.7); text-decoration: none; font-size: 14px; font-weight: 600; letter-spacing: 0.3em; text-transform: uppercase; transition: color 0.3s ease; }
    .nav-links a:hover { color: #020617; }
    .nav-btn a { color: #020617; text-decoration: none; font-size: 12px; font-weight: 600; letter-spacing: 0.25em; text-transform: uppercase; border: 1px solid rgba(2, 6, 23, 0.4); padding: 10px 24px; border-radius: 4px; transition: all 0.3s ease; background: transparent; }
    .nav-btn a:hover { background: #020617; color: #fff; }
    
    #overlay { position: absolute; top: 60px; left: 0; width: 100%; height: calc(100vh - 60px); z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
    #text-box { width: 100%; max-width: 1400px; padding: 0 1vw; display: flex; flex-direction: column; justify-content: flex-start; align-items: flex-start; background: transparent; }
    #scene-label { font-size: 20px; letter-spacing: 0.4em; text-transform: uppercase; color: rgba(255, 255, 255, 0.6); margin-bottom: 20px; margin-left: 2px; transition: opacity 0.4s ease; display: block; text-align: left; }
    #main-text { font-size: clamp(30px, 4.5vw, 64px); font-weight: 900; color: #a5a6a8; line-height: 0.95; letter-spacing: -0.04em; text-transform: uppercase; text-align: left; transition: opacity 0.4s ease, transform 0.4s ease; }
    
    .premium-gray-page { background-color: #f3f3f4; z-index: 9; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; }
    .image-container { display: flex; align-items: center; justify-content: center; width: 100vw; height: calc(100vh - 60px); }
    .large-img { max-width: 98%; max-height: calc(100vh - 90px); object-fit: contain; display: block; margin-bottom: 20px; }
  }

  /* ── 📱 手機版專用樣式（只在螢幕小於 768px 時生效） ── */
  @media (max-width: 768px) {
    /* 讓桌機版的複雜 Section 在手機上完全隱藏消失 */
    .desktop-only-view { display: none !important; }

    /* 🛠️ 讓手機版的 Bar 變成最純粹的普通上方排隊區塊（Static），絕對不懸浮、不遮擋任何內容 */
    .navbar {
      position: relative !important;
      width: 100vw;
      height: 60px;
      padding: 0 3vw;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f3f3f4;
    }
    .nav-links {
      display: flex;
      gap: 8px;
      list-style: none;
      overflow-x: auto;
      white-space: nowrap;
      max-width: 70vw;
      padding-bottom: 4px;
    }
    .nav-links::-webkit-scrollbar { display: none; }
    .nav-links a { color: rgba(2, 6, 23, 0.7); text-decoration: none; font-size: 10px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
    .nav-btn a { color: #020617; text-decoration: none; font-size: 10px; font-weight: 600; letter-spacing: 0.02em; text-transform: uppercase; border: 1px solid rgba(2, 6, 23, 0.4); padding: 6px 8px; border-radius: 4px; }

    /* 手機版影片首頁排版 */
    #page-home-mob { width: 100vw; background: #f3f3f4; }
    .video-container-mob { width: 100vw; height: auto; }
    .scene-vid-mob { width: 100vw; height: auto; display: block; object-fit: contain; }
    
    .overlay-mob { width: 100vw; padding: 25px 6vw; background: #f3f3f4; }
    .scene-label-mob { font-size: 12px; letter-spacing: 0.2em; color: #a5a6a8; margin-bottom: 6px; text-transform: uppercase; }
    .main-text-mob { font-size: 22px; font-weight: 900; color: #020617; line-height: 1.1; text-transform: uppercase; }

    /* 🛠️ 手機版圖片完全回歸最單純的相簿型態：緊湊排隊、高度隨圖片延伸、只在上方留出一行（25px）的呼吸空間 */
    .mobile-img-section {
      width: 100vw;
      background-color: #f3f3f4;
      padding-top: 25px; /* 👈 這裡就是你說的「在最上方接著需要的圖片，並留出一行舒服的灰色空間」 */
    }
    .mobile-img-section img {
      width: 100vw;
      height: auto;
      display: block;
      object-fit: contain;
    }
  }

  #progress { display: none !important; }
</style>
</head>
<body>

<nav id="top-navbar" class="navbar">
  <ul class="nav-links">
    <li><a href="#page-home-root">Home</a></li>
    <li><a href="#page-overview-mob">Overview</a></li>
    <li><a href="#page-tech-mob">Technology</a></li>
    <li><a href="#page-app-mob">App</a></li>
    <li><a href="#">Support</a></li>
  </ul>
  <div class="nav-btn">
    <a href="#">Buy Now</a>
  </div>
</nav>

<div id="page-home-root"></div>

<div class="desktop-only-view">
  <section id="page-home" class="page-section">
    <div id="video-container">
      <video id="scene-vid" class="scene-vid" autoplay muted playsinline src="video141.mp4"></video>
    </div>
    <div id="overlay">
      <div id="text-box">
        <div id="scene-label">AI ANALYSIS</div>
        <div id="main-text">PERSONALIZED CARE<br>POWERED BY AI</div>
      </div>
    </div>
  </section>

  <section id="page-overview" class="page-section premium-gray-page">
    <div class="image-container">
      <img src="overview1.png" alt="Overview" class="large-img">
    </div>
  </section>

  <section id="page-tech" class="page-section premium-gray-page">
    <div class="image-container">
      <img src="tec.png" alt="Technology" class="large-img">
    </div>
  </section>

  <section id="page-app" class="page-section premium-gray-page">
    <div class="image-container">
      <img src="app.png" alt="App Experience" class="large-img">
    </div>
  </section>
</div>


<div class="mobile-only-view">
  <div id="page-home-mob">
    <div class="video-container-mob">
      <video id="scene-vid-mob" class="scene-vid-mob" autoplay muted playsinline src="video141.mp4"></video>
    </div>
    <div class="overlay-mob">
      <div id="scene-label-mob">AI ANALYSIS</div>
      <div id="main-text-mob">PERSONALIZED CARE<br>POWERED BY AI</div>
    </div>
  </div>

  <div id="page-overview-mob" class="mobile-img-section">
    <img src="overview1.png" alt="Overview">
  </div>

  <div id="page-tech-mob" class="mobile-img-section">
    <img src="tec.png" alt="Technology">
  </div>

  <div id="page-app-mob" class="mobile-img-section">
    <img src="app.png" alt="App Experience">
  </div>
</div>

<div id="progress"></div>

<script>
const scenes = [
  { label: "AI ANALYSIS", main: "PERSONALIZED CARE<br>POWERED BY AI" },
  { label: "TIGHTENING", main: "LIFT AND FIRM<br>GLOW EVERY DAY" },
  { label: "LIFTING", main: "DEFINE AND ENHANCE<br>FACIAL CONTOURS" },
  { label: "INFUSION", main: "MAXIMIZE SKINCARE<br>ABSORPTION" },
  { label: "SMART APP", main: "TRACK YOUR SKIN<br>JOURNEY WITH AI" }
];

let currentScene = 0; let autoTimer = null; let transitioning = false;

// 桌機輪播
const videoEl = document.getElementById('scene-vid');
if(videoEl) {
  videoEl.addEventListener('ended', function() {
    videoEl.pause();
    videoEl.currentTime = videoEl.duration; 
    clearInterval(autoTimer); 
  });
}

// 手機輪播
const videoElMob = document.getElementById('scene-vid-mob');
if(videoElMob) {
  videoElMob.addEventListener('ended', function() {
    videoElMob.pause();
    videoElMob.currentTime = videoElMob.duration; 
  });
}

function goToScene(idx) {
  if (transitioning) return; transitioning = true;
  
  // 同步改動桌機與手機的文字
  const label = document.getElementById('scene-label'); 
  const main = document.getElementById('main-text');
  const labelMob = document.getElementById('scene-label-mob'); 
  const mainMob = document.getElementById('main-text-mob');
  
  if(main) main.style.opacity = 0;
  if(label) label.style.opacity = 0;
  
  setTimeout(() => {
    currentScene = idx; const s = scenes[currentScene];
    if(label) { label.textContent = s.label; label.style.opacity = 1; }
    if(main) { main.innerHTML = s.main; main.style.opacity = 1; }
    if(labelMob) labelMob.textContent = s.label;
    if(mainMob) mainMob.innerHTML = s.main;
    transitioning = false;
  }, 400); 
}

function nextScene() { 
  if (currentScene === scenes.length - 1) {
    if(window.innerWidth > 768) clearInterval(autoTimer);
    return;
  }
  goToScene(currentScene + 1); 
}

function startAuto() { 
  clearInterval(autoTimer); 
  autoTimer = setInterval(nextScene, 2000); 
}

if(window.innerWidth > 768) {
  startAuto();
} else {
  // 手機版用最單純的定時器切換文字即可，完全不碰觸任何滾動事件
  setInterval(nextScene, 2000);
}

// 桌機點擊空白處切換
document.addEventListener('click', e => { 
  if (window.innerWidth <= 768) return; // 手機版完全封鎖這個監聽器，不讓它干擾點擊
  if (e.target.closest('.navbar')) return; 
  if (e.target.closest('#page-overview')) return; 
  if (e.target.closest('#page-tech')) return; 
  if (e.target.closest('#page-app')) return; 
  clearInterval(autoTimer); 
  nextScene(); 
  startAuto(); 
});
</script>
</body>
</html>
