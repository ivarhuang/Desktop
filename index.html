<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Avant-Garde Experience · Ver 4.10 (Bottom Right Logo Box)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; width: 100vw; height: 100vh; font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  
  /* 標準置中滿版影片 */
  #video-container {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    z-index: 5; pointer-events: none;
  }
  
  .scene-vid {
    width: 100%; height: 100%; display: block;
    object-fit: cover; object-position: center center;
  }

  /* ── 🛠️ 頂部高奢懸浮導覽列（其餘欄位完全不動，維持原樣） ── */
  .navbar {
    position: fixed; top: 0; left: 0; width: 100vw;
    height: 80px; padding: 0 5vw; z-index: 100;
    display: flex; align-items: center; justify-content: flex-end; /* 讓最右邊的按鈕靠右 */
    background: transparent; 
  }

  /* 中間四大欄位：死死鎖定在螢幕正中央，絕不挪位 */
  .nav-links {
    display: flex; gap: 40px; list-style: none;
    position: absolute; left: 50%; transform: translateX(-50%); 
  }

  .nav-links a {
    color: rgba(255, 255, 255, 0.55); text-decoration: none;
    font-size: 11px; font-weight: 500; letter-spacing: 0.25em;
    text-transform: uppercase; transition: color 0.3s ease;
  }

  .nav-links a:hover { color: #fff; }

  /* 最右邊：BUY NOW 按鈕維持原樣 */
  .nav-btn a {
    color: #fff; text-decoration: none;
    font-size: 10px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase;
    border: 1px solid rgba(255, 255, 255, 0.35); 
    padding: 10px 24px; border-radius: 4px;
    transition: all 0.3s ease;
  }

  .nav-btn a:hover { background: #fff; color: #000; }
  
  /* 文字容器（固定在左上方，完全不動） */
  #overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 10; display: flex; flex-direction: column;
    align-items: flex-start; 
    justify-content: flex-start; 
    padding: 120px 5vw; 
    pointer-events: none;
  }
  
  /* 小字 */
  #scene-label {
    font-size: 20px; 
    letter-spacing: 0.4em; text-transform: uppercase;
    color: rgba(255,255,255,0.4); 
    margin-bottom: 20px; 
    margin-left: 1em;    
    transition: opacity 0.4s ease;
    display: block;
    width: 100%;
    text-align: left;    
  }
  
  /* 大字保險箱 */
  #text-box {
    width: 85vw; 
    height: calc(clamp(30px, 5.5vw, 85px) * 2.2); 
    display: flex;
    flex-direction: column;   
    justify-content: flex-start; 
    align-items: flex-start;   
    background: transparent;   
    padding: 0; 
  }
  
  /* 大字本體 */
  #main-text {
    font-size: clamp(30px, 5.5vw, 85px); 
    font-weight: 900;
    color: #fff; 
    line-height: 0.95;
    letter-spacing: -0.04em;
    text-transform: uppercase;
    text-align: left; 
    text-shadow: 0 4px 24px rgba(0, 0, 0, 0.7);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  /* ── 🛠️ 新增：右下方 LOGO 墊底框固定區 ── */
  .bottom-right-logo-box {
    position: fixed; bottom: 40px; right: 5vw; /* 🎯 固定在右下方 */
    z-index: 15;
    
    /* 質感半透明霧面框 */
    background: rgba(0, 0, 0, 0.4); 
    padding: 20px 30px;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: inline-block; 
  }

  .bottom-right-logo-box img {
    height: 90px; /* 🎯 依照要求，LOGO 走 90px */
    display: block;
    object-fit: contain;
  }

  #progress { display: none !important; }
  /* 原提示字（CLICK TO TRANSITION）與新 LOGO 位置重疊，故將提示字移至左下角做視覺平衡 */
  #hint { position: fixed; bottom: 40px; left: 5vw; font-size: 10px; letter-spacing: 0.15em; color: rgba(255,255,255,0.35); z-index: 20; text-transform: uppercase; }
  .fade-out { opacity: 0 !important; transform: none !important; }
</style>
</head>
<body>

<nav class="navbar">
  <ul class="nav-links">
    <li><a href="#">Overview</a></li>
    <li><a href="#">Technology</a></li>
    <li><a href="#">App</a></li>
    <li><a href="#">Support</a></li>
  </ul>
  <div class="nav-btn">
    <a href="#">Buy Now</a>
  </div>
</nav>

<div id="video-container">
  <video id="scene-vid" class="scene-vid" autoplay muted playsinline src="video11.mp4"></video>
</div>

<div id="overlay">
  <div id="text-box">
    <div id="scene-label">AI ANALYSIS</div>
    <div id="main-text">PERSONALIZED CARE<br>POWERED BY AI</div>
  </div>
</div>

<div class="bottom-right-logo-box">
  <img src="logo.png" alt="LOGO">
</div>

<div id="progress"></div>

<script>
const scenes = [
  { label: "AI ANALYSIS", main: "PERSONALIZED CARE<br>POWERED BY AI" },
  { label: "TIGHTENING", main: "LIFT AND FIRM<br>GLOW EVERY DAY" },
  { label: "LIFTING", main: "DEFINE AND ENHANCE<br>FACIAL CONTOURS" },
  { label: "INFUSION", main: "MAXIMIZE SKINCARE<br>ABSORPTION" },
  { label: "SMART APP", main: "TRACK YOUR SKIN<br>JOURNEY WITH AI" }
];

let currentScene = 0; let autoTimer = null; let transitioning = false;
const videoEl = document.getElementById('scene-vid');

videoEl.addEventListener('ended', function() {
  videoEl.pause();
  videoEl.currentTime = videoEl.duration; 
  clearInterval(autoTimer); 
});

function buildDots() {
  const prog = document.getElementById('progress'); prog.innerHTML = '';
  scenes.forEach((_, i) => { 
    const d = document.createElement('div'); d.className = 'dot' + (i === currentScene ? ' active' : ''); d.onclick = () => goToScene(i); prog.appendChild(d); 
  });
}

function goToScene(idx) {
  if (transitioning) return; transitioning = true;
  const label = document.getElementById('scene-label'); const main = document.getElementById('main-text');
  main.classList.add('fade-out'); label.classList.add('fade-out');
  
  setTimeout(() => {
    currentScene = idx; const s = scenes[currentScene];
    label.textContent = s.label; main.innerHTML = s.main;
    setTimeout(() => { main.classList.remove('fade-out'); label.classList.remove('fade-out'); buildDots(); transitioning = false; }, 50); 
  }, 400); 
}

function nextScene() { 
  if (currentScene === scenes.length - 1) {
    clearInterval(autoTimer);
    return;
  }
  goToScene(currentScene + 1); 
}

function startAuto() { clearInterval(autoTimer); autoTimer = setInterval(nextScene, 2000); }

buildDots(); startAuto();
const s = scenes[0]; document.getElementById('scene-label').textContent = s.label; document.getElementById('main-text').innerHTML = s.main;

document.addEventListener('click', e => { 
  if (e.target.closest('.navbar')) return; 
  if (e.target.closest('.bottom-right-logo-box')) return; /* 點擊 LOGO 框時不誤觸切換 */
  if (e.target.classList.contains('dot')) return; 
  clearInterval(autoTimer); 
  nextScene(); 
  startAuto(); 
});
</script>
</body>
</html>
