<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Avant-Garde Experience · Ver 5.40 (Added App Section)</title>
<style>
  /* ── 基礎全域設定 ── */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  /* 讓整個網頁支援平滑滾動 */
  html {
    scroll-behavior: smooth;
  }
  body { 
    background: #000; 
    width: 100vw; 
    overflow-x: hidden; 
    font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif; 
  }
  
  /* 定義每一個分頁都是剛好滿版螢幕 */
  .page-section {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  /* ── 第一頁：原本的動態影片首頁 ── */
  #page-home {
    z-index: 10;
  }

  #video-container {
    position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
    z-index: 5; pointer-events: none;
  }
  
  .scene-vid {
    width: 100%; height: 100%; display: block;
    object-fit: cover; object-position: center center;
  }

  /* ── 頂部高奢懸浮導覽列 ── */
  .navbar {
    position: fixed; top: 0; left: 0; width: 100vw;
    height: 80px; padding: 0 5vw; z-index: 100;
    display: flex; align-items: center; justify-content: flex-end; 
    background: transparent;
    backdrop-filter: blur(4px); 
    -webkit-backdrop-filter: blur(4px);
  }

  .nav-links {
    display: flex; gap: 40px; list-style: none;
    position: absolute; left: 50%; transform: translateX(-50%); 
  }

  .nav-links a {
    color: rgba(255, 255, 255, 0.65); text-decoration: none;
    font-size: 11px; font-weight: 500; letter-spacing: 0.25em;
    text-transform: uppercase; transition: color 0.3s ease;
    text-shadow: 0 1px 4px rgba(0,0,0,0.3); 
  }

  .nav-links a:hover { color: #fff; }

  .nav-btn a {
    color: #fff; text-decoration: none;
    font-size: 10px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase;
    border: 1px solid rgba(255, 255, 255, 0.4); 
    padding: 10px 24px; border-radius: 4px;
    transition: all 0.3s ease;
    background: rgba(0, 0, 0, 0.2);
  }

  .nav-btn a:hover { background: #fff; color: #000; }
  
  /* 文字容器 */
  #overlay {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 10; display: flex; flex-direction: column;
    align-items: flex-start; 
    justify-content: flex-start; 
    padding: 120px 5vw; 
    pointer-events: none;
  }
  
  #scene-label {
    font-size: 20px; 
    letter-spacing: 0.4em; text-transform: uppercase;
    color: rgba(255,255,255,0.4); 
    margin-bottom: 20px; 
    margin-left: 1em;    
    transition: opacity 0.4s ease;
    display: block;
    width: 100%;
    text-align: left;    
  }
  
  #text-box {
    width: 85vw; 
    height: calc(clamp(30px, 5.5vw, 85px) * 2.2); 
    display: flex;
    flex-direction: column;   
    justify-content: flex-start; 
    align-items: flex-start;   
    background: transparent;   
    padding: 0; 
  }
  
  #main-text {
    font-size: clamp(30px, 5.5vw, 71px); 
    font-weight: 900; 
    color: #fff; 
    line-height: 0.95;
    letter-spacing: -0.04em; 
    text-transform: uppercase;
    text-align: left; 
    text-shadow: 0 4px 24px rgba(0, 0, 0, 0.7);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  /* ── 右下方懸浮 HOME 鈕 ── */
  .bottom-right-home-box {
    position: fixed; 
    bottom: 60px; 
    right: 3vw; 
    z-index: 110; 
    width: 210px; 
    height: 90px; 
    background: rgba(0, 0, 0, 0.55); 
    border-radius: 18px; 
    border: 1px solid rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    
    display: flex; 
    align-items: center;
    justify-content: center;
    text-decoration: none; 
    cursor: pointer; 
    overflow: hidden; 
    transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
  }

  .bottom-right-home-box:hover {
    border-color: rgba(255, 255, 255, 0.3); 
    background: rgba(0, 0, 0, 0.75);
    transform: translateY(-3px);
  }

  .bottom-right-home-box span {
    color: #fff; 
    font-size: 58px;         
    font-weight: 900;        
    letter-spacing: -0.05em; 
    line-height: 1;
    text-transform: uppercase;
    text-align: center;
    display: block;
    width: 100%;
    user-select: none;
    margin-top: -2px; 
  }

  /* ── 通用深藍黑色版面樣式 ── */
  .dark-blue-page {
    background-color: #020617; 
    z-index: 9; 
    display: flex;
    flex-direction: column;   
    align-items: center;
    justify-content: flex-end; 
  }

  .image-container {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100vw;
    height: calc(100vh - 80px); 
  }

  .large-img {
    max-width: 98%;  
    max-height: calc(100vh - 120px); 
    object-fit: contain; 
    display: block;
    margin-bottom: 20px; 
  }

  #progress { display: none !important; }
</style>
</head>
<body>

<nav id="top-navbar" class="navbar">
  <ul class="nav-links">
    <li><a href="#page-overview">Overview</a></li>
    <li><a href="#page-tech">Technology</a></li>
    <li><a href="#page-app">App</a></li>
    <li><a href="#">Support</a></li>
  </ul>
  <div class="nav-btn">
    <a href="#">Buy Now</a>
  </div>
</nav>

<section id="page-home" class="page-section">
  <div id="video-container">
    <video id="scene-vid" class="scene-vid" autoplay muted playsinline src="video11.mp4"></video>
  </div>

  <div id="overlay">
    <div id="text-box">
      <div id="scene-label">AI ANALYSIS</div>
      <div id="main-text">PERSONALIZED CARE<br>POWERED BY AI</div>
    </div>
  </div>
</section>

<section id="page-overview" class="page-section dark-blue-page">
  <div class="image-container">
    <img src="overview.png" alt="Overview" class="large-img">
  </div>
</section>

<section id="page-tech" class="page-section dark-blue-page">
  <div class="image-container">
    <img src="tec.png" alt="Technology" class="large-img">
  </div>
</section>

<section id="page-app" class="page-section dark-blue-page">
  <div class="image-container">
    <img src="app.png" alt="App Experience" class="large-img">
  </div>
</section>

<a href="#page-home" class="bottom-right-home-box">
  <span>Home</span>
</a>

<div id="progress"></div>

<script>
const scenes = [
  { label: "AI ANALYSIS", main: "PERSONALIZED CARE<br>POWERED BY AI" },
  { label: "TIGHTENING", main: "LIFT AND FIRM<br>GLOW EVERY DAY" },
  { label: "LIFTING", main: "DEFINE AND ENHANCE<br>FACIAL CONTOURS" },
  { label: "INFUSION", main: "MAXIMIZE SKINCARE<br>ABSORPTION" },
  { label: "SMART APP", main: "TRACK YOUR SKIN<br>JOURNEY WITH AI" }
];

let currentScene = 0; let autoTimer = null; let transitioning = false;
const videoEl = document.getElementById('scene-vid');

videoEl.addEventListener('ended', function() {
  videoEl.pause();
  videoEl.currentTime = videoEl.duration; 
  clearInterval(autoTimer); 
});

function buildDots() {
  const prog = document.getElementById('progress'); prog.innerHTML = '';
  scenes.forEach((_, i) => { 
    const d = document.createElement('div'); d.className = 'dot' + (i === currentScene ? ' active' : ''); d.onclick = () => goToScene(i); prog.appendChild(d); 
  });
}

function goToScene(idx) {
  if (transitioning) return; transitioning = true;
  const label = document.getElementById('scene-label'); const main = document.getElementById('main-text');
  main.classList.add('fade-out'); label.classList.add('fade-out');
  
  setTimeout(() => {
    currentScene = idx; const s = scenes[currentScene];
    label.textContent = s.label; main.innerHTML = s.main;
    setTimeout(() => { main.classList.remove('fade-out'); label.classList.remove('fade-out'); buildDots(); transitioning = false; }, 50); 
  }, 400); 
}

function nextScene() { 
  if (currentScene === scenes.length - 1) {
    clearInterval(autoTimer);
    return;
  }
  goToScene(currentScene + 1); 
}

function startAuto() { clearInterval(autoTimer); autoTimer = setInterval(nextScene, 2000); }

buildDots(); startAuto();
const s = scenes[0]; document.getElementById('scene-label').textContent = s.label; document.getElementById('main-text').innerHTML = s.main;

/* 修改點擊事件：避免點擊第二、三、四頁或右下角 HOME 鈕時誤觸第一頁的影片文字切換 */
document.addEventListener('click', e => { 
  if (e.target.closest('.navbar')) return; 
  if (e.target.closest('.bottom-right-home-box')) return; 
  if (e.target.closest('#page-overview')) return; 
  if (e.target.closest('#page-tech')) return; 
  if (e.target.closest('#page-app')) return; /* 🎯 防止在 App 頁面點擊空白處時誤觸影片切換 */
  if (e.target.classList.contains('dot')) return; 
  clearInterval(autoTimer); 
  nextScene(); 
  startAuto(); 
});
</script>
</body>
</html>
