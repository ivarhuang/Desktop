<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avant-Garde Experience - Overview</title>
<style>
  /* ── 基礎全域設定 ── */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  html {
    scroll-behavior: smooth;
  }
  body { 
    background: #f3f3f4; 
    width: 100vw; 
    overflow-x: hidden; 
    font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif; 
  }
  
  .page-section {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  /* ── 頂部高奢懸浮導覽列（維持與首頁一致的固定懸浮） ── */
  .navbar {
    position: fixed; top: 0; left: 0; width: 100vw;
    height: 60px; 
    padding: 0 5vw; z-index: 100;
    display: flex; align-items: center; justify-content: flex-end; 
    background: transparent; 
  }

  .nav-links {
    display: flex; gap: 40px; list-style: none;
    position: absolute; left: 50%; transform: translateX(-50%); 
  }

  .nav-links a {
    color: rgba(2, 6, 23, 0.7); 
    text-decoration: none;
    font-size: 14px;         
    font-weight: 600;        
    letter-spacing: 0.3em;   
    text-transform: uppercase; 
    transition: color 0.3s ease;
  }

  /* 讓目前所在的頁面按鈕顏色變深，提示使用者身在何處 */
  .nav-links a.active, .nav-links a:hover { color: #020617; }

  .nav-btn a {
    color: #020617; 
    text-decoration: none;
    font-size: 12px;         
    font-weight: 600; 
    letter-spacing: 0.25em; 
    text-transform: uppercase;
    border: 1px solid rgba(2, 6, 23, 0.4); 
    padding: 10px 24px;       
    border-radius: 4px; 
    transition: all 0.3s ease;
    background: transparent;
  }

  .nav-btn a:hover { background: #020617; color: #fff; }

  /* ── 優雅淺灰色分頁樣式（完全交由圖片自然撐開） ── */
  .premium-gray-page {
    background-color: #f3f3f4; 
    margin-top: 60px; /* 🌟 核心保險：剛好留出 60px 導覽列的高度，圖片絕對不會被 Bar 壓到 */
    width: 100vw;
    display: flex;
    flex-direction: column;   
    align-items: center;
  }

  .image-container {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100vw;
  }

  .large-img {
    max-width: 98%;  
    max-height: calc(100vh - 90px); 
    object-fit: contain; 
    display: block;
    margin-bottom: 20px; 
  }

  /* ── 📱 手機版專用響應式樣式 ── */
  @media (max-width: 768px) {
    .navbar {
      padding: 0 3vw;
      justify-content: space-between;
    }
    .nav-links {
      position: static !important;
      transform: none !important;
      gap: 8px;
      overflow-x: auto;
      white-space: nowrap;
      max-width: 70vw !important; 
      padding-bottom: 4px;
    }
    .nav-links::-webkit-scrollbar {
      display: none;
    }
    .nav-links a {
      font-size: 10px;
      letter-spacing: 0.04em;
    }
    .nav-btn a {
      padding: 6px 8px;
      font-size: 10px;
      letter-spacing: 0.02em;
    }

    /* 手機版讓圖片最極致緊湊，上方剛剛好接著 Bar 下滑一行 */
    .premium-gray-page {
      margin-top: 60px; /* 扣除 Bar 高度 */
      padding-top: 20px; /* 👈 這裡就是你要的，在最上方留出「一行字」左右的舒服灰色呼吸空間 */
    }
    .image-container {
      width: 100vw !important;
      height: auto !important;
      display: block !important;
    }
    .large-img {
      width: 100vw !important;
      height: auto !important;
      display: block !important;
      margin-bottom: 0 !important;
      object-fit: contain !important;
    }
  }
</style>
</head>
<body>

<nav id="top-navbar" class="navbar">
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="overview.html" class="active">Overview</a></li> <li><a href="tech.html">Technology</a></li>
    <li><a href="app.html">App</a></li>
    <li><a href="#">Support</a></li>
  </ul>
  <div class="nav-btn">
    <a href="#">Buy Now</a>
  </div>
</nav>

<div class="premium-gray-page">
  <div class="image-container">
    <img src="overview1.png" alt="Overview" class="large-img">
  </div>
</div>

</body>
</html>
